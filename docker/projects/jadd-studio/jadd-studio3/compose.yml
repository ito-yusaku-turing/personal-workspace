#====================================================================================================================
# JADD STUDIO 3 / node 24 https://hub.docker.com/_/node
#====================================================================================================================
services:
  # フロントエンド/サーバー サービス
  jadd_studio3:
    image: node:24.0.2-bullseye
    container_name: jadd_studio3
    user: ${USER_ID?err}:${GROUP_ID?err}
    working_dir: "/usr/app/jadd_studio3"
    init: true
    environment:
      - TZ=Asia/Tokyo
      - ENV_NAME=development
      - HOME=/usr/home
      - NODE_OPTIONS=--no-deprecation
      - PORT=${PORT_JADD_STUDIO3_NEXT:-3001}
      # ローカル backend-api へ proxy（未設定なら navi-routes はモックにフォールバック）。
      # ローカル FastAPI は /v1 を付けないため PREFIX は空にする。
      - BACKEND_API_URL=http://backend-api-host:8000
      - BACKEND_API_PREFIX=
    volumes:
      - "/etc/passwd:/etc/passwd:ro"
      - "/etc/group:/etc/group:ro"
      - "../../../../user-home:/usr/home"
      - "../../../../../jadd-studio/jadd_studio3:/usr/app/jadd_studio3"
    ports:
      - "${PORT_JADD_STUDIO3_NEXT:-3001}:${PORT_JADD_STUDIO3_NEXT:-3001}"
    networks:
      jadd-studio-net:
        aliases:
          - jadd_studio3-host
    command: sh -c "npm run dev"
